<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITシラバス6.5 クイズ（一括解除機能版）</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        #login-screen { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; margin-top: 50px; }
        #game-container, #review-container { display: none; max-width: 700px; width: 100%; }
        #game-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; margin-top: 20px; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.9rem; color: #666; }
        .logout-btn { background: #6c757d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .scoreboard { display: flex; justify-content: space-around; background: #343a40; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; }
        .score-val { display: block; font-size: 1.2rem; color: #ffc107; text-align: center; }
        .question-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .question-box { font-size: 1.25rem; font-weight: bold; line-height: 1.6; flex-grow: 1; color: #333; }
        .check-btn { background: none; border: none; font-size: 1.8rem; cursor: pointer; color: #ccc; transition: 0.2s; padding: 0 0 0 10px; outline: none; }
        .check-btn.active { color: #ffc107; }
        .choice-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e0e0e0; border-radius: 8px; background: white; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
        .choice-btn:hover:not(:disabled) { background: #f8f9fa; border-color: #007bff; }
        #feedback { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; line-height: 1.6; }
        .correct-ui { background: #e8f5e9; border: 1px solid #c8e6c9; color: #2e7d32; }
        .incorrect-ui { background: #ffebee; border: 1px solid #ffcdd2; color: #c62828; }
        .btn-next { margin-top: 20px; width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        #review-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .review-item { border-bottom: 1px solid #eee; padding: 12px; cursor: pointer; border-radius: 5px; }
        .review-item:hover { background: #eef6ff; }
        .scroll-area { max-height: 400px; overflow-y: auto; }
        input[type="text"] { padding: 12px; width: 250px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 15px; font-size: 1rem; }
        .btn-login { padding: 12px 30px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        
        /* 新しいボタンのスタイル */
        .blacklist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-clear-all { background: #dc3545; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .btn-clear-all:hover { background: #a71d2a; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>ITクイズへようこそ</h2>
    <p>名前を入力して学習を始めましょう</p>
    <input type="text" id="username-input" placeholder="ユーザー名を入力">
    <br>
    <button class="btn-login" onclick="login()">開始する</button>
</div>

<div id="game-container">
    <div class="user-info">
        <span>ユーザー: <strong id="display-name"></strong></span>
        <button class="logout-btn" onclick="logout()">別の名前で入る</button>
    </div>
    
    <div class="scoreboard">
        <div class="score-item">解いた数<span id="total-count" class="score-val">0</span></div>
        <div class="score-item">正解数<span id="correct-count" class="score-val">0</span></div>
        <div class="score-item" style="color: #00d4ff;">残り問題<span id="remaining-count" class="score-val" style="color: #00d4ff;">-</span></div>
        <div class="score-item">正答率<span id="accuracy" class="score-val">0%</span></div>
    </div>

    <div id="quiz-area">
        <div class="question-header">
            <div class="question-box" id="q-text">問題を表示中...</div>
            <button id="star-btn" class="check-btn" onclick="toggleCheck()">★</button>
            <button id="black-btn" class="check-btn" onclick="addToBlacklistDirectly()" title="ブラックボックス（除外）" style="font-size: 1.5rem;">⬛</button>
        </div>
        <div id="choices-container"></div>
        <div id="feedback">
            <strong id="result-label"></strong><br>
            <span id="explanation-text"></span>
        </div>
        <button id="next-btn" class="btn-next" style="display:none;" onclick="loadQuestion()">次のランダム問題へ</button>
    </div>
</div>

<div id="review-container">
    <h3>📌 <span id="list-owner"></span>さんの確認リスト</h3>
    <div class="scroll-area" id="review-list-container">
        <div id="review-list">チェックした問題はありません。</div>
    </div>
    
    <div id="blacklist-container" style="margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 20px;">
        <div class="blacklist-header">
            <h3 style="color: #333; margin: 0;">⬛ ブラックボックス</h3>
            <button class="btn-clear-all" onclick="clearAllBlacklist()">全て出題対象に戻す</button>
        </div>
        <p style="font-size: 0.8rem; color: #666;">正解した問題、または⬛を押した問題はここに入り、出題されません。</p>
        <div class="scroll-area" id="blacklist-list-container">
            <div id="blacklist-list" style="font-size: 0.9rem; color: #666;">除外された問題はありません。</div>
        </div>
    </div>
</div>

<script>
// --- グローバル変数 ---
let currentUser = "";
let currentQuestion = null;
let checkedIds = [];
let blacklistedIds = []; 
let totalSolved = 0;
let correctTotal = 0;

// --- クイズデータ ---

const rawQuestions = rawData.map((item, index) => ({ ...item, id: index + 1 }));

// --- システム関数 ---

function login() {
    const nameInput = document.getElementById('username-input').value.trim();
    if (!nameInput) {
        alert("名前を入力してください");
        return;
    }
    currentUser = nameInput;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('game-container').style.display = 'block';
    document.getElementById('review-container').style.display = 'block';
    document.getElementById('display-name').innerText = currentUser;
    document.getElementById('list-owner').innerText = currentUser;

    const saved = localStorage.getItem('it-quiz-checked-' + currentUser);
    checkedIds = saved ? JSON.parse(saved) : [];

    const savedBlack = localStorage.getItem('it-quiz-black-' + currentUser);
    blacklistedIds = savedBlack ? JSON.parse(savedBlack) : [];
    
    renderReviewList();
    renderBlacklist();
    loadQuestion();
    updateScoreboard();
}

function logout() {
    if(confirm("ログアウトしますか？")) {
        location.reload();
    }
}

function updateScoreboard() {
    const accuracy = totalSolved === 0 ? 0 : Math.round((correctTotal / totalSolved) * 100);
    const remaining = rawQuestions.length - blacklistedIds.length;
    
    document.getElementById('total-count').innerText = totalSolved;
    document.getElementById('correct-count').innerText = correctTotal;
    document.getElementById('remaining-count').innerText = remaining;
    document.getElementById('accuracy').innerText = accuracy + "%";
}

function setQuiz(questionObj) {
    currentQuestion = questionObj;
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('star-btn').classList.toggle('active', checkedIds.includes(currentQuestion.id));
    
    updateBlacklistUI();

    const distractors = currentQuestion.d || [];
    const choices = [currentQuestion.a, ...distractors].sort(() => 0.5 - Math.random());
    
    document.getElementById('q-text').innerText = currentQuestion.q;
    const container = document.getElementById('choices-container');
    container.innerHTML = "";
    
    choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerText = choice;
        btn.onclick = () => checkAnswer(choice, currentQuestion.a, currentQuestion.ex);
        container.appendChild(btn);
    });
}

function loadQuestion() {
    const availableQuestions = rawQuestions.filter(q => !blacklistedIds.includes(q.id));
    
    if (availableQuestions.length === 0) {
        alert("全問クリアです！素晴らしい！一括解除ボタンで最初からやり直せます。");
        return;
    }

    const randomQ = availableQuestions[Math.floor(Math.random() * availableQuestions.length)];
    setQuiz(randomQ);
}

function loadSpecificQuestion(id) {
    const target = rawQuestions.find(q => q.id === id);
    if (target) setQuiz(target);
}

function checkAnswer(selected, correct, explanation) {
    totalSolved++;
    const feedback = document.getElementById('feedback');
    const isCorrect = selected === correct;
    
    if (isCorrect) {
        correctTotal++;
        if (!blacklistedIds.includes(currentQuestion.id)) {
            blacklistedIds.push(currentQuestion.id);
            saveAndSyncBlacklist();
        }
    }
    
    document.getElementById('result-label').innerText = isCorrect ? "✅ 正解！ (除外リストに保存)" : "❌ 不正解...（正解： " + correct + "）";
    feedback.className = isCorrect ? "correct-ui" : "incorrect-ui";
    document.getElementById('explanation-text').innerText = "解説： " + explanation;
    feedback.style.display = 'block';
    
    updateScoreboard();
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    document.getElementById('next-btn').style.display = 'block';
}

function toggleCheck() {
    if (!currentQuestion) return;
    const index = checkedIds.indexOf(currentQuestion.id);
    if (index > -1) {
        checkedIds.splice(index, 1);
    } else {
        checkedIds.push(currentQuestion.id);
    }
    localStorage.setItem('it-quiz-checked-' + currentUser, JSON.stringify(checkedIds));
    document.getElementById('star-btn').classList.toggle('active', checkedIds.includes(currentQuestion.id));
    renderReviewList();
}

function addToBlacklistDirectly() {
    if (!currentQuestion) return;
    if (!blacklistedIds.includes(currentQuestion.id)) {
        blacklistedIds.push(currentQuestion.id);
        saveAndSyncBlacklist();
    }
    loadQuestion();
}

function removeFromBlacklist(id) {
    if(confirm("この問題を出題リストに戻しますか？")) {
        blacklistedIds = blacklistedIds.filter(bid => bid !== id);
        saveAndSyncBlacklist();
    }
}

/* ★一括解除関数 */
function clearAllBlacklist() {
    if (blacklistedIds.length === 0) {
        alert("除外されている問題はありません。");
        return;
    }
    if (confirm("登録されているすべての除外を解除し、全問を出題対象に戻しますか？")) {
        blacklistedIds = [];
        saveAndSyncBlacklist();
        alert("すべての問題を復活させました！");
    }
}

function saveAndSyncBlacklist() {
    localStorage.setItem('it-quiz-black-' + currentUser, JSON.stringify(blacklistedIds));
    renderBlacklist();
    updateBlacklistUI();
    updateScoreboard();
}

function renderBlacklist() {
    const listDiv = document.getElementById('blacklist-list');
    if (blacklistedIds.length === 0) {
        listDiv.innerHTML = "除外された問題はありません。";
        return;
    }
    const blackItems = rawQuestions.filter(q => blacklistedIds.includes(q.id));
    listDiv.innerHTML = blackItems.reverse().map(item => `
        <div class="review-item" style="display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #333;">
            <div onclick="loadSpecificQuestion(${item.id})" style="flex-grow: 1; cursor: pointer;">
                <strong>Q. ${item.q}</strong>
            </div>
            <button onclick="removeFromBlacklist(${item.id})" style="background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-left: 10px; white-space: nowrap;">
                復活
            </button>
        </div>
    `).join('');
}

function updateBlacklistUI() {
    const isBlack = blacklistedIds.includes(currentQuestion.id);
    const btn = document.getElementById('black-btn');
    btn.style.color = isBlack ? "#000" : "#ccc";
}

function renderReviewList() {
    const listDiv = document.getElementById('review-list');
    if (checkedIds.length === 0) {
        listDiv.innerHTML = "チェックした問題はありません。";
        return;
    }
    const checkedItems = rawQuestions.filter(q => checkedIds.includes(q.id));
    listDiv.innerHTML = checkedItems.reverse().map(item => `
        <div class="review-item" onclick="loadSpecificQuestion(${item.id})">
            <strong>Q. ${item.q}</strong><br>
            <small style="color:#007bff">クリックで再挑戦</small>
        </div>
    `).join('');
}
